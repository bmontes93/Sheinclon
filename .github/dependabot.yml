version: 2
updates:
  # Backend dependencies
  - package-ecosystem: 'npm'
    directory: '/backend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'tu-usuario'
    assignees:
      - 'tu-usuario'
    commit-message:
      prefix: 'chore(backend)'
      prefix-development: 'chore(backend-dev)'
      include: 'scope'

  # Frontend dependencies
  - package-ecosystem: 'npm'
    directory: '/frontend'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'tu-usuario'
    assignees:
      - 'tu-usuario'
    commit-message:
      prefix: 'chore(frontend)'
      prefix-development: 'chore(frontend-dev)'
      include: 'scope'

  # Root dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'tu-usuario'
    assignees:
      - 'tu-usuario'
    commit-message:
      prefix: 'chore(root)'
      prefix-development: 'chore(root-dev)'
      include: 'scope'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'tu-usuario'
    assignees:
      - 'tu-usuario'
    commit-message:
      prefix: 'ci'
      include: 'scope'
